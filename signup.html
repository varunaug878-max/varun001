<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker - Sign Up</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="auth-body">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="muted">Sign up to start tracking</p>

      <form id="signupForm">
        <label for="signupName">Name</label>
        <input type="text" id="signupName" autocomplete="name" required />

        <label for="signupEmail">Email</label>
        <input type="email" id="signupEmail" autocomplete="email" required />

        <label for="signupPassword">Password</label>
        <input type="password" id="signupPassword" autocomplete="new-password" required />

        <label for="signupConfirmPassword">Confirm Password</label>
        <input type="password" id="signupConfirmPassword" autocomplete="new-password" required />

        <button type="submit">Create Account</button>
        <p id="signupMessage" class="message"></p>
      </form>

      <p class="muted">Already have an account? <a href="login.html">Login</a></p>
    </div>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
